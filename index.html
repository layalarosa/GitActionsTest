<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Docker HTML Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      main {
        width: min(90vw, 640px);
        padding: 32px;
        border: 1px solid #d8deea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 32px rgb(23 32 51 / 10%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HTML de prueba en Docker</h1>
      <p>Este archivo se sirve desde un contenedor Nginx y se valida con GitHub Actions.</p>
    </main>
  </body>
</html>
